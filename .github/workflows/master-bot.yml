name: Master Bot Update
on:
  schedule:
    - cron: '0 */3 * * *' # 한국시간(KST) 새벽 2시 = UTC 17시
  workflow_dispatch: # 깃허브 홈페이지에서 버튼 눌러서 수동 실행 기능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 데이터를 저장(push)할 수 있는 권한
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install

      - name: 마스터 크롤러 실행
        run: npm run update:master

      - name: 깃허브에 데이터 자동 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "봇: 마스터 데이터 정기 업데이트" && git push)name: Master Bot Update
